# 复制为 saber.local.yaml 后按个人环境填写；该文件不会提交。
schemaVersion: 2

# 可选个人默认工具。
defaults:
  tool: codex

# 只能为团队已声明项目补充安全的 Git 远端；不能改项目路径或新增项目。
projects:
  frontend:
    repository: https://git.example.com/team/frontend.git
  backend:
    repository: git@git.example.com:team/backend.git

# 个人技能由后续物化流程从仓库根 skills/<id> 加载。
# 个人提示词包从仓库根 prompts/<id>/SKILL.md 加载，仅作为本地上下文。
# capability 只能引用 standard preset 中已有的 L0/L1 能力。
extensions:
  # 添加前先在 skills/<id>/SKILL.md 安装同名个人技能包。
  skills: []
  # 添加前先在 prompts/<id>/SKILL.md 创建同名个人提示词包。
  prompts: []
  capabilities:
    - mysql.read
    - external.assets.update
  # 这里只能选择团队 mcp.servers 中已有的 ID；选择 server 不会授予额外 capability。
  mcpServers: []

# 可添加个人 MCP server，但不能覆盖团队同名 server，且只能映射已有 L0/L1 capability。
mcp:
  servers: []

  # 个人 stdio 示例：验证包名、参数和工具名后再取消注释。
