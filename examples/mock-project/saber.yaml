# DEMO-101 独立练习配置；使用与主仓库相同的唯一 schema。
schemaVersion: 3
name: Saber mock project

workspace:
  tools:
    default: codex
  projects:
    - name: frontend
      path: projects/frontend
      capabilities:
        - jira.read
        - gitlab.mr.read
    - name: backend
      path: projects/backend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - mysql.read

externalSkills:
  preset: standard

# 练习默认不连接真实 MCP；按主配置注释补充经过团队审核的 server。
mcp:
  servers: []
