# 团队配置只声明项目差异；安全策略、角色、能力和连接器来自 standard preset。
schemaVersion: 2
name: Saber

workspace:
  # 团队默认工具；成员可在 saber.local.yaml 中覆盖。
  tools:
    default: codex
  # 业务仓保持独立 Git 仓库，克隆地址由成员本地配置。
  projects:
    - name: frontend
      path: projects/frontend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - idea.project.read
    - name: backend
      path: projects/backend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - mysql.read

# standard preset 提供团队约定的 Superpowers 与 OpenSpec 外部技能包。
externalSkills:
  preset: standard
