# 配置格式版本；所有仓库级配置均集中在本文件。
schemaVersion: 1
# 团队 AI 研发资产框架名称。
name: Saber
# 安全基线：外部写入必须先预览并由真人确认。
safety:
  # L2 动作统一采用“预览 + 确认”流程。
  externalWrites: preview-and-confirm
  # L3（破坏性或提权）能力在 MVP 中永久禁止。
  forbiddenRiskLevels:
    - L3
# 多项目工作区：业务仓位于被 Git 忽略的 projects/ 目录，各自独立提交和切换分支。
workspace:
  # AI 工具选择：仅保存工具名，不保存任何个人配置或凭证。
  tools:
    # 未显式指定工具时使用的默认工具。
    default: codex
    # 团队可按需生成运行时入口的工具集合。
    supported:
      - codex
      - claude
      - opencode
    # 未显式选择能力时加载的只读/低风险默认能力。
    defaultCapabilities:
      - jira.read
      - gitlab.mr.read
      - idea.project.read
  # 业务仓清单；repository 留空表示成员在本地按团队规则配置 clone 来源。
  projects:
    # 前端仓在本地工作区中的相对路径及常用能力。
    - name: frontend
      path: projects/frontend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - idea.project.read
    # 后端仓在本地工作区中的相对路径及常用能力。
    - name: backend
      path: projects/backend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - mysql.read
# 语义能力目录：risk 是风险等级，kind 是 read/action，connector 是提供该能力的连接器 ID。
capabilities:
  # Jira 需求读取可自动执行。
  - id: jira.read
    risk: L0
    kind: read
    connector: jira
  # Jira 更新是外部写入，必须走 L2 预览和真人确认。
  - id: jira.update
    risk: L2
    kind: action
    connector: jira
  # GitLab 合并请求读取可自动执行。
  - id: gitlab.mr.read
    risk: L0
    kind: read
    connector: gitlab
  # 创建 GitLab 合并请求是外部写入。
  - id: gitlab.mr.create
    risk: L2
    kind: action
    connector: gitlab
  # MySQL MCP 的只读查询。
  - id: mysql.read
    risk: L0
    kind: read
    connector: mysql-mcp
  # MySQL MCP 的写入操作必须确认。
  - id: mysql.write
    risk: L2
    kind: action
    connector: mysql-mcp
  # IdeaMCP 的项目读取。
  - id: idea.project.read
    risk: L0
    kind: read
    connector: idea-mcp
  # IdeaMCP 执行命令必须确认。
  - id: idea.command.execute
    risk: L2
    kind: action
    connector: idea-mcp
  # 更新外部资产只影响本地忽略目录，可作为 L1 操作。
  - id: external.assets.update
    risk: L1
    kind: action
# 连接器模板：只声明 ID、类型、环境变量“名称”和提供的能力，绝不保存凭证或连接地址的值。
connectors:
  # IdeaMCP 通过本机命令启动或连接。
  - id: idea-mcp
    kind: mcp-command
    # 成员本机提供的命令变量名。
    requiredEnv:
      - IDEA_MCP_COMMAND
    # 此连接器可提供的能力 ID。
    provides:
      - idea.project.read
      - idea.command.execute
  # MySQL MCP 通过本机命令启动或连接。
  - id: mysql-mcp
    kind: mcp-command
    requiredEnv:
      - MYSQL_MCP_COMMAND
    provides:
      - mysql.read
      - mysql.write
  # Jira 使用 HTTP 连接器；实际 URL 和令牌只存在于成员本机环境。
  - id: jira
    kind: http
    requiredEnv:
      - JIRA_BASE_URL
      - JIRA_API_TOKEN
    provides:
      - jira.read
      - jira.update
  # GitLab 使用 HTTP 连接器；实际 URL 和令牌只存在于成员本机环境。
  - id: gitlab
    kind: http
    requiredEnv:
      - GITLAB_BASE_URL
      - GITLAB_API_TOKEN
    provides:
      - gitlab.mr.read
      - gitlab.mr.create
# 外部资产源：仅在成员显式执行手动更新时下载到被忽略的 .saber/external/ 目录。
externalAssets:
  assets:
    # Superpowers 上游公开 Git 源与本地忽略目标目录。
    - id: superpowers
      kind: git
      source: https://github.com/obra/superpowers.git
      destination: .saber/external/superpowers
    # OpenSpec 上游公开 Git 源与本地忽略目标目录。
    - id: openspec
      kind: git
      source: https://github.com/Fission-AI/OpenSpec.git
      destination: .saber/external/openspec
