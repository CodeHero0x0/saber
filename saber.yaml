# 配置格式版本；所有仓库级配置均集中在本文件。
schemaVersion: 1
# 团队 AI 研发资产框架名称。
name: Saber
# 安全基线：外部写入必须先预览并由真人确认。
safety:
  # L2 动作统一采用“预览 + 确认”流程。
  externalWrites: preview-and-confirm
  # L3（破坏性或提权）能力在 MVP 中永久禁止。
  forbiddenRiskLevels:
    - L3
# 多项目工作区：业务仓位于被 Git 忽略的 projects/ 目录，各自独立提交和切换分支。
workspace:
  # AI 工具选择：仅保存工具名，不保存任何个人配置或凭证。
  tools:
    # 未显式指定工具时使用的默认工具。
    default: codex
    # 团队可按需生成运行时入口的工具集合。
    supported:
      - codex
      - claude
      - opencode
    # 未显式选择能力时加载的只读/低风险默认能力。
    defaultCapabilities:
      - jira.read
      - gitlab.mr.read
      - idea.project.read
  # 业务仓清单；repository 留空表示成员在本地按团队规则配置 clone 来源。
  projects:
    # 前端仓在本地工作区中的相对路径及常用能力。
    - name: frontend
      path: projects/frontend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - idea.project.read
    # 后端仓在本地工作区中的相对路径及常用能力。
    - name: backend
      path: projects/backend
      capabilities:
        - jira.read
        - gitlab.mr.read
        - mysql.read
# 角色加载清单：角色只定义默认上下文与门禁，不授予外部写权限。
roleProfiles:
  # BA 负责澄清需求、记录证据并在 Jira 变化时暂停。
  - id: ba
    teamSkills:
      - grill-me
      - grill-with-docs
      - openspec
    externalSkills:
      - openspec/openspec-explore
      - openspec/openspec-propose
    workflows:
      - requirements
    capabilities:
      - jira.read
      - gitlab.mr.read
  # Dev 负责设计、实现、按仓验证与可审查交付。
  - id: dev
    teamSkills:
      - superpowers
      - grill-me
      - openspec
    externalSkills:
      - superpowers/writing-plans
      - superpowers/systematic-debugging
      - superpowers/verification-before-completion
      - openspec/openspec-apply-change
    workflows:
      - develop
      - fix
    capabilities:
      - jira.read
      - gitlab.mr.read
      - git.push
  # QA 负责测试设计、失败定位与证据化交接。
  - id: qa
    teamSkills:
      - superpowers
      - grill-with-docs
    externalSkills:
      - superpowers/systematic-debugging
      - superpowers/requesting-code-review
      - superpowers/verification-before-completion
    workflows:
      - test
      - fix
    capabilities:
      - jira.read
      - gitlab.mr.read
# 语义能力目录：risk 是风险等级，kind 是 read/action，connector 是提供该能力的连接器 ID。
capabilities:
  # Jira 需求读取可自动执行。
  - id: jira.read
    risk: L0
    kind: read
    connector: jira
  # Jira 更新是外部写入，必须走 L2 预览和真人确认。
  - id: jira.update
    risk: L2
    kind: action
    connector: jira
  # GitLab 合并请求读取可自动执行。
  - id: gitlab.mr.read
    risk: L0
    kind: read
    connector: gitlab
  # 创建 GitLab 合并请求是外部写入。
  - id: gitlab.mr.create
    risk: L2
    kind: action
    connector: gitlab
  # 推送业务仓分支是外部写入，必须绑定项目、账号、分支和 commit 后确认。
  - id: git.push
    risk: L2
    kind: action
    connector: git
  # MySQL MCP 的只读查询。
  - id: mysql.read
    risk: L0
    kind: read
    connector: mysql-mcp
  # MySQL MCP 的写入操作必须确认。
  - id: mysql.write
    risk: L2
    kind: action
    connector: mysql-mcp
  # IdeaMCP 的项目读取。
  - id: idea.project.read
    risk: L0
    kind: read
    connector: idea-mcp
  # IdeaMCP 执行命令必须确认。
  - id: idea.command.execute
    risk: L2
    kind: action
    connector: idea-mcp
  # 更新外部资产只影响本地忽略目录，可作为 L1 操作。
  - id: external.assets.update
    risk: L1
    kind: action
# 连接器模板：只声明 ID、类型、环境变量“名称”和提供的能力，绝不保存凭证或连接地址的值。
connectors:
  # Git CLI 只允许普通 push；账号标识用于 L2 预览，实际凭证仍由本机 Git 管理。
  - id: git
    kind: git-cli
    requiredEnv:
      - GIT_PUSH_ACCOUNT_ID
    provides:
      - git.push
  # IdeaMCP 通过本机命令启动或连接。
  - id: idea-mcp
    kind: mcp-command
    # 成员本机提供的命令变量名。
    requiredEnv:
      - IDEA_MCP_COMMAND
    # 此连接器可提供的能力 ID。
    provides:
      - idea.project.read
      - idea.command.execute
  # MySQL MCP 通过本机命令启动或连接。
  - id: mysql-mcp
    kind: mcp-command
    requiredEnv:
      - MYSQL_MCP_COMMAND
    provides:
      - mysql.read
      - mysql.write
  # Jira 使用 HTTP 连接器；实际 URL 和令牌只存在于成员本机环境。
  - id: jira
    kind: http
    requiredEnv:
      - JIRA_BASE_URL
      # 非敏感账号标识会显示在 L2 预览中并绑定确认 token。
      - JIRA_ACCOUNT_ID
      - JIRA_API_TOKEN
    provides:
      - jira.read
      - jira.update
  # GitLab 使用 HTTP 连接器；实际 URL 和令牌只存在于成员本机环境。
  - id: gitlab
    kind: http
    requiredEnv:
      - GITLAB_BASE_URL
      # 非敏感账号标识会显示在 L2 预览中并绑定确认 token。
      - GITLAB_ACCOUNT_ID
      - GITLAB_API_TOKEN
    provides:
      - gitlab.mr.read
      - gitlab.mr.create
# 外部资产源：仅在成员显式执行手动更新时写入被忽略的 saber-v1 缓存与物化目录。
externalAssets:
  # 每项包含稳定 id、分类、用途说明、Git 源和选中的包；不得填写凭证或私有地址。
  assets:
    # Superpowers 是可按需拉取的外部技能集合，不随脚手架仓库提交。
    - id: superpowers
      # 分类用于区分技能集合与未来可配置的 MCP 服务集合。
      category: skill-collection
      # 面向成员的简短用途说明，不包含任何凭证或私有地址。
      description: 团队可按需拉取的 Superpowers 技能集合。
      # 当前更新方式；MVP 仅支持安全的 Git clone/pull。
      kind: git
      # 上游公开 Git 源；凭证、URL 参数和片段均不允许写入配置。
      source: https://github.com/obra/superpowers.git
      # 仅稀疏拉取并物化以下技能包；不要填写上游仓库根目录。
      packages:
        # 稳定包 ID 和上游子树路径；包目录必须包含 SKILL.md 及其依赖资料。
        - id: brainstorming
          sourcePath: skills/brainstorming
        - id: writing-plans
          sourcePath: skills/writing-plans
        - id: executing-plans
          sourcePath: skills/executing-plans
        - id: systematic-debugging
          sourcePath: skills/systematic-debugging
        - id: verification-before-completion
          sourcePath: skills/verification-before-completion
        - id: requesting-code-review
          sourcePath: skills/requesting-code-review
    # OpenSpec 是可按需拉取的外部规格工作流技能集合。
    - id: openspec
      category: skill-collection
      description: 团队可按需拉取的 OpenSpec 规格工作流技能集合。
      kind: git
      source: https://github.com/Fission-AI/OpenSpec.git
      # 仅暴露需求探索、提案、实施和归档四个核心流程技能。
      packages:
        - id: openspec-explore
          sourcePath: skills/openspec-explore
        - id: openspec-propose
          sourcePath: skills/openspec-propose
        - id: openspec-apply-change
          sourcePath: skills/openspec-apply-change
        - id: openspec-archive-change
          sourcePath: skills/openspec-archive-change
